SilverStripe\SiteConfig\SiteConfig:
  cms_logo: '_resources/app/client/images/logo_footer.svg'
  cms_logo_width: 60 # Optional width constraint

SilverStripe\Admin\LeftAndMain:
  cms_background: '#000000'
  cms_border_color: '#151515'
  cms_color: '#fff'
  cms_hover_background: '#151515'
  cms_hover_color: currentColor
  cms_active_background: '#151515'
  cms_active_color: currentColor
  cms_drawer_background: '#151515'
  cms_drawer_color: 'inherit'
  cms_icon_color: currentColor
  menu_groups:
    Inhalt:
      icon_class: 'stevens-icon-news-admin-currentColor' # (optional) Defaults to 'fa-solid fa-cubes'
      priority: -70 # (optional) Defaults to menu item order
      items:
        - SilverStripe-CMS-Controllers-CMSMain
        - App-Team-TeamAdmin
        - App-Wiki-WikiAdmin
    Vor Ort:
      icon_class: 'stevens-icon-institution-admin-currentColor' # (optional) Defaults to 'fa-solid fa-cubes'
      priority: -80 # (optional) Defaults to menu item order
      items:
        - App-Events-EventAdmin
        - App-FleaMarket-FleaMarketAdmin
        - App-ImageBooth-ImageBoothAdmin
        - App-POS-POSAdmin
        - App-Feedback-FeedbackAdmin
    Marketing:
      icon_class: 'stevens-icon-news-admin-currentColor' # (optional) Defaults to 'fa-solid fa-cubes'
      priority: -90 # (optional) Defaults to menu item order
      items:
        - App-Podcast-PodcastAdmin
        - App-Press-PressAdmin
    Other:
      icon_class: 'fa fa-folder' # (optional) Defaults to 'fa fa-folder'
      priority: -100 # (optional) Defaults to menu item order
      items:
        - SilverStripe-SiteConfig-SiteConfig
        - SilverStripe-Admin-SecurityAdmin
        - SilverStripe-AssetAdmin-Controller-AssetAdmin
        - SilverStripe-CampaignAdmin-CampaignAdmin
        - SilverStripe-VersionedAdmin-ArchiveAdmin
        - SilverStripe-Reports-ReportAdmin
        - TractorCow-Fluent-Control-LocaleAdmin
        - SilverStripe-SiteConfig-SiteConfigLeftAndMain
        - WebbuildersGroup-SiteConfigErrorPages-Control-Admin-CustomSiteConfigAdmin

SilverStripe\Admin\SecurityAdmin:
  menu_priority: -1
